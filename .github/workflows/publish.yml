name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: makerxstudio/shared-config/.github/workflows/node-ci.yml@main
    with:
      audit-script: npm run audit

  publish:
    needs: ci
    uses: makerxstudio/shared-config/.github/workflows/node-trusted-publish.yml@main
    with:
      access: public
